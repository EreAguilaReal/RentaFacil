services:
  - type: web
    name: rentafacil-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: rentafacil-db
          property: connectionString

databases:
  - name: rentafacil-db
    databaseName: rentafacil_db
    user: postgres